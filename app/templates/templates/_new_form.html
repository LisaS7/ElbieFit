<form hx-post="/template/create" hx-swap="none">
    <h3>New template:</h3>
    <div class="form-row">
        <div class="form-field">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="e.g. Push Day A" required>
        </div>
    </div>

    <div class="form-row">
        <button type="submit" class="button small">Save</button>
        <button
            type="button"
            hx-on="click: document.closeForm('#new-template-form-container')"
            class="button small secondary"
        >
            Cancel
        </button>
    </div>
</form>
