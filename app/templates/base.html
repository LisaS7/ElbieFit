<!DOCTYPE html>
<html lang="en" data-theme="{{ theme or 'volt' }}">
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}ElbieFit{% endblock %}</title>
    {# HTMX #}
    <script src="https://unpkg.com/htmx.org@1.9.10/dist/htmx.min.js"
            integrity="sha384-D1Kt99CQMDuVetoL1lrYwg5t+9QdHe7NLX/SoJYkXDFfX37iInKRy5xLSi8nO7UC"
            crossorigin="anonymous"></script>
    <script>
      document.addEventListener('htmx:configRequest', function(event) {
        const match = document.cookie.split('; ').find(function(row) {
          return row.startsWith('csrf_token=');
        });
        if (match) {
          event.detail.headers['X-CSRFToken'] = match.split('=')[1];
        }
      });
    </script>
    {# Font #}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&family=Quantico:wght@400;700&display=swap" rel="stylesheet">
    {# Style #}
    <link rel="stylesheet" href="{{ url_for('static', path='CSS/base.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', path='CSS/themes.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', path='CSS/components.css') }}" />
    {% block extra_css %}{% endblock %}
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', path='favicon.ico') }}">
  </head>
  <body>
    <header id="app-header" class="flex-row-spaced">

      <a id="brand" href="/">
        <svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <linearGradient id="brand-visorGrad" x1="130" y1="232" x2="382" y2="232" gradientUnits="userSpaceOnUse">
              <stop stop-color="var(--color-heading)"/>
              <stop offset="1" stop-color="var(--color-accent)"/>
            </linearGradient>
            <filter id="brand-glow" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur stdDeviation="6" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <filter id="brand-softGlow" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur stdDeviation="10" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>
          <rect x="32" y="32" width="448" height="448" rx="28" fill="var(--color-bg)"/>
          <rect x="32.75" y="32.75" width="446.5" height="446.5" rx="27.25" stroke="var(--color-borders)" stroke-width="1.5"/>
          <path d="M88 140V88H140" stroke="var(--color-accent)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" filter="url(#brand-glow)"/>
          <path d="M372 88H424V140" stroke="var(--color-accent)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" filter="url(#brand-glow)"/>
          <path d="M140 424H88V372" stroke="var(--color-accent)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" filter="url(#brand-glow)"/>
          <path d="M424 372V424H372" stroke="var(--color-accent)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" filter="url(#brand-glow)"/>
          <g filter="url(#brand-softGlow)">
            <path d="M130 232 C148 192 204 158 256 158 C308 158 364 192 382 232 C364 272 308 306 256 306 C204 306 148 272 130 232 Z"
                  fill="var(--color-bg)" stroke="var(--color-accent)" stroke-width="3.5"/>
            <path d="M144 232 C162 196 214 168 256 168 C298 168 350 196 368 232 C350 268 298 296 256 296 C214 296 162 268 144 232 Z"
                  fill="url(#brand-visorGrad)" opacity="0.9"/>
          </g>
          <g filter="url(#brand-glow)">
            <g transform="rotate(10, 198, 231)">
              <rect x="158" y="220" width="80" height="22" rx="11" fill="var(--color-bg)"/>
              <rect x="165" y="224" width="66" height="14" rx="7" fill="var(--color-accent)"/>
              <rect x="167" y="225" width="20" height="10" rx="5" fill="var(--color-heading)" opacity="0.75"/>
            </g>
            <g transform="rotate(-10, 314, 231)">
              <rect x="274" y="220" width="80" height="22" rx="11" fill="var(--color-bg)"/>
              <rect x="281" y="224" width="66" height="14" rx="7" fill="var(--color-accent)"/>
              <rect x="283" y="225" width="20" height="10" rx="5" fill="var(--color-heading)" opacity="0.75"/>
            </g>
          </g>
          <g opacity="0.85" filter="url(#brand-glow)">
            <rect x="208" y="370" width="96" height="12" rx="6" fill="var(--color-accent)"/>
            <rect x="188" y="358" width="20" height="36" rx="4" fill="var(--color-accent)" opacity="0.9"/>
            <rect x="172" y="362" width="17" height="28" rx="3" fill="var(--color-accent)" opacity="0.65"/>
            <rect x="304" y="358" width="20" height="36" rx="4" fill="var(--color-accent)" opacity="0.9"/>
            <rect x="324" y="362" width="17" height="28" rx="3" fill="var(--color-accent)" opacity="0.65"/>
            <line x1="248" y1="372" x2="248" y2="380" stroke="var(--color-bg)" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="256" y1="372" x2="256" y2="380" stroke="var(--color-bg)" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="264" y1="372" x2="264" y2="380" stroke="var(--color-bg)" stroke-width="2.5" stroke-linecap="round"/>
          </g>
        </svg>
        <p>ElbieFit</p>
      </a>

      <button
      class="menu-toggle"
      type="button"
      aria-expanded="false"
      aria-label="Toggle navigation"
      aria-controls="main-nav"
      >☰</button>

      <nav id="main-nav" class="nav-panel">
        <a href="/profile">Profile</a>
        <a href="/workout/all">Workouts</a>
        <a href="/template/all">Templates</a>
        <a href="/exercise/all">Exercises</a>
        <a href="/progress">Progress</a>
      </nav>
    </header>

    {% block flash %}{% endblock %}

    <main id="page-content">
      {% block content %}{% endblock %}
    </main>

    <footer id="page-footer">
      <p>&copy; {{ current_year }} ElbieFit</p>
    </footer>
    <script src="{{ url_for('static', path='js/main.js') }}"></script>
    <script src="{{ url_for('static', path='js/number-spinner.js') }}"></script>
    <script src="{{ url_for('static', path='js/custom-select.js') }}"></script>
    <script>
      document.querySelectorAll('#main-nav a').forEach(link => {
        const href = link.getAttribute('href');
        if (href !== '/' && location.pathname.startsWith(href)) {
          link.classList.add('nav-active');
        }
      });
    </script>
    {% block extra_js %}{% endblock %}
  </body>
</html>
